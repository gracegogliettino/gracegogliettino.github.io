short_bio: >-
  <p>
    I am an undergraduate rising senior at Colgate University studying Astrophysics and Computer Science. I am currently a researcher at Yale University studying galactic quenching with FIRE-2 simulations.
  </p>
  <p>
    In addition, I am working on a fourth year of research in the field of active galactic nuclei. With collaborators from NASA Jet Propulsion Laboratory and Quinnipiac University, I study accretion disks of quasars in an effort to model their temperature.
  </p>
  <p>
    My interests are orientated towards exploring cosmology through computational astrophysics.
  </p>
